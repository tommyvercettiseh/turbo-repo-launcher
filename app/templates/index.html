<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">🚀</div>
        <div><h1>Turbo Repo Hub</h1><p>Jouw verbonden repositories</p></div>
      </div>
      <div class="top-actions">
        <input id="repoSearch" type="search" placeholder="Zoek repositories…" aria-label="Zoek repositories">
        <button class="icon-button" onclick="refreshEverything()" title="Verversen" aria-label="Verversen">↻</button>
        <button class="icon-button" onclick="toggleSetup()" title="Instellingen" aria-label="Instellingen">☰</button>
      </div>
    </header>

    <section id="setupPanel" class="setup-panel hidden">
      <div class="setup-row">
        <div><strong id="githubTitle">GitHub koppelen</strong><span id="githubMessage">Controleer je GitHub-verbinding.</span></div>
        <div class="setup-actions">
          <button id="installGhButton" class="button subtle hidden" onclick="installGitHubCli()">GitHub CLI installeren</button>
          <button id="loginGhButton" class="button subtle" onclick="loginGitHub()">Inloggen</button>
          <button id="importGhButton" class="button primary hidden" onclick="importGitHubRepos()">Repo’s ophalen</button>
        </div>
      </div>
      <div class="setup-grid">
        <label>Losse repo toevoegen<div><input id="repoUrl" placeholder="https://github.com/gebruiker/project"><button class="button primary" onclick="addRepo()">Toevoegen</button></div></label>
        <label>Lokale projectmap<div><input id="repoRoot" value="{{ repo_root }}"><button class="button subtle" onclick="saveRepoRoot()">Opslaan</button></div></label>
      </div>
    </section>

    <nav class="filters" aria-label="Repositoryfilters">
      <button class="filter active" data-filter="all">Alles <span id="countAll">0</span></button>
      <button class="filter" data-filter="update">Updates <span id="countUpdates">0</span></button>
      <button class="filter" data-filter="updated">Updated <span id="countUpdated">0</span></button>
      <button class="filter" data-filter="publish">Publiceer <span id="countPublish">0</span></button>
    </nav>

    <section id="repoGrid" class="repo-grid" aria-live="polite"></section>
  </main>

  <dialog id="modal"><div class="modal-head"><h3 id="modalTitle">Resultaat</h3><button onclick="closeModal()">×</button></div><pre id="modalContent"></pre></dialog>
  <div id="toast" class="toast hidden"></div>
  <script>window.__INITIAL_REPOS__ = {{ repos | tojson }};</script>
  <script src="/static/app.js"></script>
</body>
</html>
